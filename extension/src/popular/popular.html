<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rRed — Popular URLs</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px; color: #111827; background: #f9fafb;
        -webkit-font-smoothing: antialiased;
      }
      .topbar {
        display: flex; align-items: center; gap: 16px;
        padding: 0 24px; height: 56px; background: #fff;
        border-bottom: 1px solid #e5e7eb;
        box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        position: sticky; top: 0; z-index: 50;
      }
      .topbar-logo {
        font-weight: 800; font-size: 18px; letter-spacing: -0.5px;
        color: #ef4444; text-decoration: none;
        display: flex; align-items: center; gap: 8px;
      }
      .topbar-logo::before {
        content: ''; width: 24px; height: 24px;
        background: linear-gradient(135deg, #ef4444, #b91c1c);
        border-radius: 6px; display: inline-block;
      }
      .page { max-width: 960px; width: 100%; margin: 0 auto; padding: 32px 24px; }
      .page-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
      .page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
      .page-subtitle { color: #6b7280; font-size: 13px; margin-bottom: 24px; }
      .controls { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
      .controls label { font-size: 13px; font-weight: 500; color: #374151; }
      .controls input[type="number"] {
        width: 70px; padding: 6px 10px; border: 1px solid #d1d5db;
        border-radius: 6px; font-size: 13px; outline: none;
      }
      .controls input[type="number"]:focus {
        border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.12);
      }
      .table-wrap {
        background: #fff; border: 1px solid #e5e7eb;
        border-radius: 10px; overflow: hidden;
        box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      }
      table { width: 100%; border-collapse: collapse; table-layout: fixed; }
      col.col-url   { width: 38%; }
      col.col-title { width: 22%; }
      col.col-visits { width: 8%; }
      col.col-action { width: 32%; }
      th {
        text-align: left; font-size: 11px; font-weight: 600;
        text-transform: uppercase; letter-spacing: 0.5px;
        color: #6b7280; padding: 12px 16px; background: #f9fafb;
        border-bottom: 1px solid #e5e7eb;
      }
      td {
        padding: 10px 16px; border-bottom: 1px solid #f3f4f6;
        vertical-align: middle; font-size: 13px;
      }
      tr:last-child td { border-bottom: none; }
      tr:hover td { background: #fef2f2; }
      .url-cell {
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .url-cell a { color: #dc2626; text-decoration: none; }
      .url-cell a:hover { text-decoration: underline; }
      .title-cell {
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .visit-count { color: #6b7280; font-weight: 500; }
      .action-cell {
        display: flex; align-items: center; gap: 8px;
      }
      .alias-input {
        padding: 6px 10px; border: 1px solid #d1d5db;
        border-radius: 6px; font-size: 13px; outline: none;
        flex: 1; min-width: 0;
      }
      .alias-input:focus {
        border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.12);
      }
      .btn {
        display: inline-flex; align-items: center; justify-content: center;
        padding: 6px 14px; border-radius: 6px; border: none;
        font-size: 12px; font-weight: 500; cursor: pointer;
        transition: all 0.15s ease; white-space: nowrap; flex-shrink: 0;
      }
      .btn:active { transform: scale(0.97); }
      .btn-primary {
        background: linear-gradient(135deg, #ef4444, #dc2626);
        color: #fff; box-shadow: 0 1px 2px rgba(239,68,68,0.3);
      }
      .btn-primary:hover {
        background: linear-gradient(135deg, #dc2626, #b91c1c);
        box-shadow: 0 2px 8px rgba(239,68,68,0.35);
      }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
      .empty { padding: 40px; text-align: center; color: #9ca3af; font-size: 13px; }
      .loading { padding: 40px; text-align: center; color: #9ca3af; font-size: 13px; }
      .status-msg {
        font-size: 11px; flex-shrink: 0; animation: fadeIn 0.2s ease;
      }
      .status-success { color: #16a34a; }
      .status-error { color: #ef4444; }
      .ws-select {
        padding: 6px 10px; border: 1px solid #d1d5db;
        border-radius: 6px; font-size: 13px; outline: none;
      }
      .ws-select:focus {
        border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.12);
      }
      .row-fade-out {
        animation: fadeOut 0.3s ease forwards;
      }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes fadeOut {
        from { opacity: 1; transform: translateX(0); }
        to { opacity: 0; transform: translateX(20px); }
      }
    </style>
  </head>
  <body>
    <nav class="topbar">
      <a class="topbar-logo" id="logo-link" href="#">rRed</a>
    </nav>
    <div class="page">
      <div class="page-header">
        <h1 class="page-title">Popular URLs</h1>
      </div>
      <p class="page-subtitle">Your most visited URLs that don't have rRed aliases yet. Add aliases to save time.</p>
      <div id="app"><p class="loading">Loading browser history...</p></div>
    </div>
    <script src="../popular.js"></script>
  </body>
</html>
